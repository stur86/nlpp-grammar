name: Publish to npm

on:
  workflow_call:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm trusted publishing (OIDC) + provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # setup-node ships npm 10.x; trusted publishing (OIDC) needs >= 11.5.1.
      # Without this the publish fails on auth in a way that looks nothing like
      # a version problem.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      # `npm publish` runs the `prepack` script (`tree-sitter build --wasm`),
      # which needs a C-to-wasm toolchain. Pinned rather than floating: the
      # emscripten version determines the bytes of the published artifact.
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Install dependencies
        run: npm ci

      # Belt and braces: prepack builds these into the tarball anyway, but a
      # failure here is a clear error rather than a confusing one mid-publish.
      - name: Build parser and WASM
        run: npm run build

      - name: Test
        run: npm test

      # DIAGNOSTIC (temporary): npm swallows OIDC token-exchange failures at the
      # default log level, so a trusted-publishing problem surfaces only as a
      # bare ENEEDAUTH. Confirm the id-token request env is actually present in
      # this (reusable) job. If these are empty, the `id-token: write` permission
      # isn't reaching the job; if they're set, the failure is in npm's exchange
      # with the registry (see the verbose publish output below).
      - name: Debug OIDC token availability
        run: |
          echo "GITHUB_ACTIONS=${GITHUB_ACTIONS}"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN present: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"
          echo "npm version: $(npm --version)"
          echo "npm registry: $(npm config get registry)"

      # `--loglevel verbose` / NPM_CONFIG_LOGLEVEL make npm print the OIDC
      # exchange it otherwise hides, so a rejected trusted-publisher claim shows
      # up instead of a confusing ENEEDAUTH. Remove once publishing is green.
      - name: Publish
        run: npm publish --provenance --access public --loglevel verbose
        env:
          NPM_CONFIG_LOGLEVEL: verbose
