name: Publish to npm

on:
  workflow_call:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm trusted publishing (OIDC) + provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # setup-node ships npm 10.x; trusted publishing (OIDC) needs >= 11.5.1.
      # Without this the publish fails on auth in a way that looks nothing like
      # a version problem.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      # `npm publish` runs the `prepack` script (`tree-sitter build --wasm`),
      # which needs a C-to-wasm toolchain. Pinned rather than floating: the
      # emscripten version determines the bytes of the published artifact.
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Install dependencies
        run: npm ci

      # Belt and braces: prepack builds these into the tarball anyway, but a
      # failure here is a clear error rather than a confusing one mid-publish.
      - name: Build parser and WASM
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public
