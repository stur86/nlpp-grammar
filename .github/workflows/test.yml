name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Corpus and drift
    runs-on: ubuntu-latest

    # This job needs no emscripten: the drift check is deterministic text and the
    # corpus tests build the parser from src/parser.c. Everything that needs the
    # WASM lives in the `wasm` job, which builds it fresh.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # `tree-sitter generate` is deterministic text — no emscripten in the loop —
      # so the generated C parser must always match grammar.js. This catches the
      # real hazard: editing grammar.js without regenerating.
      - name: Generated parser is in sync with grammar.js
        run: |
          npx tree-sitter generate
          if ! git diff --exit-code --stat -- src/; then
            echo "::error::src/ is out of sync with grammar.js. Run 'npm run build' and commit the result."
            exit 1
          fi

      - name: Corpus tests
        run: npm test

  wasm:
    name: WASM builds, parses, and matches the TextMate grammar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Pinned deliberately: the emscripten version determines the WASM bytes.
      # This must stay in step with the pin in publish.yml.
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Install dependencies
        run: npm ci

      - name: Build WASM
        run: npm run build

      - name: Parse the examples with the built WASM
        run: npm run test:examples

      # The TextMate grammar (nlpp.tmLanguage.json) is a second, hand-maintained
      # source of truth for the syntax. This holds it in lockstep with
      # highlights.scm on an enumerated set of tokens, so a change to one grammar
      # that isn't mirrored in the other fails here. Uses the WASM built above.
      - name: TextMate grammar is in lockstep with highlights.scm
        run: npm run test:parity

  package:
    name: Package installs cleanly
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # `npm pack` (inside test:package) runs the `prepack` script, which builds
      # the WASM into the tarball — so this job needs the toolchain too.
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Install dependencies
        run: npm ci

      - name: Pack and install as a consumer
        run: npm run test:package
